spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1 
#url connect to base
spring.datasource.driver-class-name=org.h2.Driver
#used driver is H2
spring.datasource.username=sa 
#default name for H2 base
spring.datasource.password=
#default empty password
spring.jpa.hibernate.ddl-auto=create-drop
#create the tables at the beginning and drop them when we close the app
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#we use H2 SQL dialect
spring.flyway.enabled=true
#run flyway migrations