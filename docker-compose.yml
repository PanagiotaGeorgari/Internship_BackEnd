services:
  db:
    image: mysql:8.0
    container_name: cards-db
    restart: always
    environment:
      MYSQL_DATABASE: cards
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  app:
    build: .
    container_name: cards-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/cards

volumes:
  mysql_data: